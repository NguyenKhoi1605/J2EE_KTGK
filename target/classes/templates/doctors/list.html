<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors - Clinic Appointment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
        }

        .navbar {
            background-color: var(--primary-color) !important;
        }

        .header-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 40px 0;
            text-align: center;
        }

        .doctor-card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
        }

        .doctor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .doctor-image {
            height: 200px;
            object-fit: cover;
            background-color: #e0e0e0;
        }

        .pagination .page-link {
            color: var(--secondary-color);
        }

        .pagination .page-link.active {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .footer {
            background-color: var(--primary-color);
            color: white;
            margin-top: 50px;
            padding: 30px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">🏥 Clinic Appointment</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/doctors">Doctors</a></li>
                    <li class="nav-item" sec:authorize="hasRole('PATIENT')">
                        <a class="nav-link" href="/my-appointments">My Appointments</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" href="/register">Register</a></li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link"><span sec:authentication="principal.username"></span></span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form method="POST" action="/logout" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-link nav-link" style="color: white !important;">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="header-section">
        <div class="container">
            <h1 class="display-4 mb-2">Our Doctors</h1>
            <p class="lead">Meet our qualified medical professionals</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-shrink-0">
        <div class="container my-5">
            <!-- Doctors List -->
            <div class="row g-4">
                <div th:each="doctor : ${doctors}" class="col-md-6 col-lg-4">
                    <div class="card doctor-card">
                        <img th:src="${doctor.image}" class="card-img-top doctor-image" 
                             alt="Doctor" onerror="this.src='https://via.placeholder.com/200?text=Doctor'">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${doctor.name}"></h5>
                            <p class="card-text">
                                <strong>Specialty:</strong> <span th:text="${doctor.specialty}"></span><br>
                                <strong>Department:</strong> <span th:text="${doctor.department.name}"></span>
                            </p>
                            <div class="d-grid gap-2">
                                <a th:href="@{/doctors/{id}(id=${doctor.id})}" class="btn btn-outline-primary">View Details</a>
                                <a th:href="@{/appointment/book(doctorId=${doctor.id})}" class="btn btn-primary" sec:authorize="hasRole('PATIENT')">Book Appointment</a>
                                <a href="/login" class="btn btn-primary" sec:authorize="!isAuthenticated()">Book Appointment</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div th:if="${totalPages > 1}" class="d-flex justify-content-center my-4">
                <nav>
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/doctors(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="page : ${#numbers.sequence(0, totalPages - 1)}" 
                            th:classappend="${page == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/doctors(page=${page})}" th:text="${page + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/doctors(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-5">
        <div class="container">
            <p>&copy; 2026 Clinic Appointment System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
