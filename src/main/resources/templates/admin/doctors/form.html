<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Form - Clinic Appointment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
        }

        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: var(--primary-color) !important;
        }

        .header-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 40px 0;
            text-align: center;
        }

        .form-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }

        .btn-primary {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .footer {
            background-color: var(--primary-color);
            color: white;
            margin-top: 50px;
            padding: 30px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">🏥 Clinic Appointment</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/admin/doctors">Back to List</a></li>
                    <li class="nav-item">
                        <form method="POST" action="/logout" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-link nav-link" style="color: white !important;">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="header-section">
        <div class="container">
            <h1 class="display-4" th:text="${doctor != null} ? 'Edit Doctor' : 'Add New Doctor'"></h1>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-shrink-0">
        <div class="container my-5">
            <div class="form-container">
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Error!</strong> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form method="post" th:action="${doctor != null} ? @{/admin/doctors/edit/{id}(id=${doctor.id})} : @{/admin/doctors/create}" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="mb-3">
                        <label for="name" class="form-label">Doctor Name *</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               th:value="${doctor?.name}" required>
                    </div>

                    <div class="mb-3">
                        <label for="specialty" class="form-label">Specialty *</label>
                        <input type="text" class="form-control" id="specialty" name="specialty" 
                               th:value="${doctor?.specialty}" placeholder="e.g., Cardiology, Pediatrics" required>
                    </div>

                    <div class="mb-3">
                        <label for="image" class="form-label">Doctor Image</label>
                        <input type="file" class="form-control" id="image" name="image" 
                               accept="image/*">
                        <small class="form-text text-muted">Upload a doctor's image (JPG, PNG, etc.)</small>
                        <div th:if="${doctor?.image}" class="mt-2">
                            <small class="text-muted">Current image:</small><br>
                            <img th:src="${doctor.image}" style="max-width: 100px; max-height: 100px; margin-top: 5px;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="departmentId" class="form-label">Department *</label>
                        <select class="form-control" id="departmentId" name="departmentId" required>
                            <option value="">-- Select Department --</option>
                            <option th:each="dept : ${departments}" th:value="${dept.id}" 
                                    th:text="${dept.name}"
                                    th:selected="${doctor?.department?.id == dept.id}"></option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg" 
                                th:text="${doctor != null} ? 'Update Doctor' : 'Add Doctor'"></button>
                        <a href="/admin/doctors" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-5">
        <div class="container">
            <p>&copy; 2026 Clinic Appointment System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
