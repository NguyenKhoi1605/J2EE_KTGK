<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Details - Clinic Appointment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
        }

        .navbar {
            background-color: var(--primary-color) !important;
        }

        .doctor-detail-image {
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .detail-card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
            padding: 30px;
        }

        .footer {
            background-color: var(--primary-color);
            color: white;
            margin-top: 50px;
            padding: 30px 0;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .btn-primary:hover {
            background-color: #2980b9;
            border-color: #2980b9;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">🏥 Clinic Appointment</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/doctors">Doctors</a></li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" href="/login">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-shrink-0">
        <div class="container my-5">
            <div class="row">
                <div class="col-md-4">
                    <img th:src="${doctor.image}" class="doctor-detail-image w-100" 
                         alt="Doctor" onerror="this.src='https://via.placeholder.com/400?text=Doctor'">
                </div>
                <div class="col-md-8">
                    <div class="detail-card">
                        <h1 th:text="${doctor.name}" class="mb-3"></h1>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <h5>Specialty</h5>
                                <p th:text="${doctor.specialty}"></p>
                            </div>
                            <div class="col-md-6">
                                <h5>Department</h5>
                                <p th:text="${doctor.department.name}"></p>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <a th:href="@{/appointment/book(doctorId=${doctor.id})}" class="btn btn-primary btn-lg" sec:authorize="hasRole('PATIENT')">
                                Book Appointment Now
                            </a>
                            <a href="/login" class="btn btn-primary btn-lg" sec:authorize="!isAuthenticated()">
                                Login to Book Appointment
                            </a>
                        </div>

                        <a href="/doctors" class="btn btn-outline-secondary mt-3 w-100">← Back to Doctors</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-5">
        <div class="container">
            <p>&copy; 2026 Clinic Appointment System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
